<button
  type="button"
  mat-icon-button
  (click)="passwordVisibility().toggle()"
  [attr.aria-label]="passwordVisibility().visible() ? 'Hide ' + controlLabel() : 'Show ' + controlLabel()"
  [attr.aria-pressed]="passwordVisibility().visible()"
>
  <mat-icon>{{ passwordVisibility().visible() ? 'visibility_off' : 'visibility' }}</mat-icon>
</button>
