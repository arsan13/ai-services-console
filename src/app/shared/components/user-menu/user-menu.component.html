<button mat-button [matMenuTriggerFor]="userMenu" class="user-trigger">
  <mat-icon>account_circle</mat-icon>
  <span class="trigger-name">{{ user().fullName || user().email }}</span>
  <mat-icon>arrow_drop_down</mat-icon>
</button>

<mat-menu #userMenu="matMenu" xPosition="before">
  <div class="menu-header" (click)="$event.stopPropagation()">
    <p class="menu-name">{{ user().fullName || user().email }}</p>
    <!-- @if (user().email) { -->
      <div class="menu-email-row">
        <p class="menu-username">{{ user().email }}</p>
      </div>
      <div class="verification-status">
        @if (user().verified) {
          <span class="verified-status" aria-label="User verified">
            <mat-icon>verified</mat-icon>
            <span>Verified</span>
          </span>
        } @else {
          <span class="unverified-status" aria-label="User not verified">
            <mat-icon>mail_outline</mat-icon>
            <span>User not verified</span>
          </span>
        }
      </div>
    <!-- } -->
  </div>

  <mat-divider />

  @if (user().roles.length) {
    <div class="menu-section-label" (click)="$event.stopPropagation()">Roles</div>
    @for (role of user().roles; track role) {
      <div class="menu-role" (click)="$event.stopPropagation()">
        <span class="role-chip">{{ role.replace('ROLE_', '') }}</span>
      </div>
    }
    <mat-divider />
  }

  <button mat-menu-item (click)="openChangePassword()">
    <mat-icon>lock_reset</mat-icon>
    <span>Change password</span>
  </button>

  <mat-divider />

  <button mat-menu-item (click)="logout()">
    <mat-icon>logout</mat-icon>
    <span>Logout</span>
  </button>
</mat-menu>
