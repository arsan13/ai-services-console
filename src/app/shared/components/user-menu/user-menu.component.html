@if (userService.currentUser(); as user) {
  <button mat-button [matMenuTriggerFor]="userMenu" class="user-trigger">
    <mat-icon>account_circle</mat-icon>
    <span class="trigger-name">{{ user.fullName || user.username }}</span>
    <mat-icon>arrow_drop_down</mat-icon>
  </button>

  <mat-menu #userMenu="matMenu" xPosition="before">
    <div class="menu-header" (click)="$event.stopPropagation()">
      <p class="menu-name">{{ user.fullName || user.username }}</p>
      @if (user.username) {
        <p class="menu-username">&#64;{{ user.username }}</p>
      }
    </div>

    <mat-divider />

    @if (user.roles?.length) {
      <div class="menu-section-label" (click)="$event.stopPropagation()">Roles</div>
      @for (role of user.roles; track role) {
        <div class="menu-role" (click)="$event.stopPropagation()">
          <span class="role-chip">{{ role.replace('ROLE_', '') }}</span>
        </div>
      }
      <mat-divider />
    }

    <button mat-menu-item (click)="logout()">
      <mat-icon>logout</mat-icon>
      <span>Logout</span>
    </button>
  </mat-menu>
}
