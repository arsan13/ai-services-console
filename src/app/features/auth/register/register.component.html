<section class="auth-shell">
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>

  <mat-card class="auth-card">
    <p class="eyebrow">Join The App</p>
    <h2>Create Account</h2>
    <p class="subtitle">Set up your profile and start chatting in seconds.</p>

    <form class="auth-form" (ngSubmit)="onSubmit()">
      <mat-form-field class="field" appearance="outline">
        <mat-label>Full Name</mat-label>
        <input matInput [(ngModel)]="fullname" name="fullname" [disabled]="isLoading" required />
      </mat-form-field>

      <mat-form-field class="field" appearance="outline">
        <mat-label>Username or Email</mat-label>
        <input matInput [(ngModel)]="username" name="username" [disabled]="isLoading" required />
      </mat-form-field>

      <mat-form-field class="field" appearance="outline">
        <mat-label>Password</mat-label>
        <input matInput type="password" [(ngModel)]="password" name="password" [disabled]="isLoading" required />
        @if (isLoading) {
          <mat-spinner matSuffix diameter="16"></mat-spinner>
        }
      </mat-form-field>

      <button class="submit-btn" mat-flat-button color="primary" [disabled]="isLoading">Register</button>
    </form>

    <div class="alt-actions">
      <button mat-stroked-button (click)="login()" [disabled]="isLoading">Already have an account? Login</button>
    </div>
  </mat-card>
</section>
