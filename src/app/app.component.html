<mat-toolbar color="primary" class="toolbar">
  <div class="toolbar-left">
    <a class="brand" routerLink="/">AI Console</a>

    @if (currentUser; as user) {
      <app-tabs />
    }
  </div>

  <div class="toolbar-right">
    <app-theme-toggle></app-theme-toggle>

    @if (currentUser; as user) {
      <app-user-menu [user]="user" />
    }
  </div>
</mat-toolbar>

<main class="content-scroll">
  @if (shouldShowVerificationBanner) {
    <app-verification-banner
      [source]="verificationBannerSource()"
      [resendLoading]="resendLoading()"
      [resendStatus]="resendStatus()"
      [resendStatusMessage]="resendStatusMessage()"
      (dismissed)="onBannerDismissed()"
      (resendClicked)="onResendVerification()"
    />
  }

  <router-outlet></router-outlet>
</main>
